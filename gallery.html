<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie | Dracheschwänz</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body data-page="gallery">
<div id="navbar"></div>

  <main>
    <section class="page-hero">
      <img src="img/gruppen-foto.png" alt="Fasnachtsstimmung der Dracheschwaenz">
      <div>
        <p class="overline">Galerie</p>
        <h1>Stimmung, Farbe und Fasnacht</h1>
      </div>
    </section>

    <section class="section gallery-section">
      <p class="lead">Die offizielle Seite lebt von authentischen Fotos. Diese Galerie nutzt die vorhandenen Bilder und gibt dem Prototyp echte Vereinsstimmung statt Platzhalter-Flächen.</p>
      <div class="gallery-grid">
        <button class="gallery-item gallery-item--large" type="button" data-lightbox="img/gruppen-foto.png" data-caption="Dracheschwänz Chriens">
          <img src="img/gruppen-foto.png" alt="Dracheschwänz Chriens">
          <span>Gruppe</span>
        </button>
        <button class="gallery-item" type="button" data-lightbox="img/auftritt.png" data-caption="Auftritt">
          <img src="img/auftritt.png" alt="Auftritt">
          <span>Auftritt</span>
        </button>
        <button class="gallery-item" type="button" data-lightbox="img/probe.png" data-caption="Probe">
          <img src="img/probe.png" alt="Probe">
          <span>Probe</span>
        </button>
      </div>
    </section>
  </main>

  <div class="lightbox" aria-hidden="true" data-lightbox-modal>
    <button class="lightbox__close" type="button" aria-label="Bild schliessen" data-lightbox-close>x</button>
    <img src="img/gruppen-foto.png" alt="" data-lightbox-image>
    <p data-lightbox-caption></p>
  </div>

  <footer class="site-footer"><p>&copy; 2021 Dracheschwänz Chriens</p><a href="join.html">Mitglied werden</a><a href="mailto:dracheschwaenz@gmail.com">Kontakt</a></footer>
</body>
</html>
